# Hermes 框架主配置
# 运行时参数、插件加载、网关设置

platform:
  name: Suri
  version: "0.1.0"
  mode: production  # development | production
  debug: false

# 插件与网关
plugins:
  enabled:
    - telegram_adapter
    - memory_manager
    - model_router
    - security_hooks
    - workflow_engine

gateway:
  default_interface: telegram
  fallback_interface: null

# 安全设置
security:
  hook_enabled: true
  approval_required: true
  auto_approve_threshold: 0  # 0 = 全部需审批
  log_all_operations: true

# 记忆设置
memory:
  backend: sqlite  # sqlite | redis | file
  database_path: state.db
  global_retention_days: 90
  cross_role_share: false

# 调度设置
scheduler:
  max_retries: 3
  retry_intervals: [0, 30, 120]  # 秒
  default_dispatch_target: department_lead
  escalation_timeout: 300  # 5分钟后未处理则升级

# 日志
logging:
  level: INFO
  path: logs/
  max_size_mb: 100
  backup_count: 10
