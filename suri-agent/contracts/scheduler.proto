syntax = "proto3";

package suri.scheduler;

import "common.proto";

// 调度编排服务接口

service Scheduler {
  rpc CreateTask(CreateTaskRequest) returns (Task);
  rpc GetTask(TaskId) returns (Task);
  rpc GetTaskStatus(TaskId) returns (TaskStatus);
  rpc ListTasks(TaskFilter) returns (TaskList);
  
  rpc CreateAgent(CreateAgentRequest) returns (Agent);
  rpc GetAgent(AgentId) returns (Agent);
  rpc UpdateAgentStatus(AgentStatusUpdate) returns (Agent);
  
  rpc DispatchStep(StepRequest) returns (StepResult);
  rpc HandleEscalation(EscalationRequest) returns (Empty);
  
  rpc RequestApproval(ApprovalRequest) returns (ApprovalResponse);
  rpc ApproveOperation(ApproveRequest) returns (ApprovalToken);
  rpc RejectOperation(RejectRequest) returns (Empty);
  
  rpc SubscribeTaskEvents(TaskId) returns (stream TaskEvent);
}

message TaskId { string id = 1; }
message AgentId { string id = 1; }

message CreateTaskRequest {
  string user_id = 1;
  string session_id = 2;
  string content = 3;
  string source = 4;       // "cli" | "telegram" | "web" | "rpc"
}

message Task {
  string id = 1;
  string user_id = 2;
  string session_id = 3;
  string content = 4;
  string status = 5;       // "pending" | "in_progress" | "completed" | "failed"
  repeated string agent_ids = 6;
}

message TaskStatus {
  string task_id = 1;
  string status = 2;
  int32 completed_steps = 3;
  int32 total_steps = 4;
  string current_step = 5;
}

message TaskFilter {
  string user_id = 1;
  string status = 2;
}

message TaskList {
  repeated Task tasks = 1;
}

message CreateAgentRequest {
  string task_id = 1;
  string user_id = 2;
  string role_id = 3;
}

message Agent {
  string id = 1;
  string task_id = 2;
  string role_id = 3;
  string status = 4;       // "planning" | "running" | "blocked" | "completed"
  repeated Step steps = 5;
}

message AgentStatusUpdate {
  string agent_id = 1;
  string status = 2;
  string block_reason = 3;
}

message Step {
  string id = 1;
  string description = 2;
  string assignee = 3;     // role_id
  string status = 4;       // "pending" | "in_progress" | "completed" | "blocked"
  repeated string depends_on = 5;
  string result = 6;
}

message StepRequest {
  string agent_id = 1;
  string step_id = 2;
}

message StepResult {
  string step_id = 1;
  string status = 2;
  string result = 3;
}

message EscalationRequest {
  string agent_id = 1;
  string reason = 2;
  string target_role = 3;  // "suri_dev" | "suri_hr"
}

message ApprovalRequest {
  string operator = 1;
  string action = 2;
  repeated string files = 3;
  string reason = 4;
}

message ApprovalResponse {
  string approval_id = 1;
  string status = 2;       // "pending" | "approved" | "rejected"
}

message ApproveRequest {
  string approval_id = 1;
  string confirmed_by = 2;
}

message ApprovalToken {
  string token = 1;
  int32 expires_at = 2;
}

message RejectRequest {
  string approval_id = 1;
  string reason = 2;
}

message TaskEvent {
  string type = 1;         // "created" | "step_completed" | "agent_blocked" | "completed"
  string task_id = 2;
  string payload = 3;
}
