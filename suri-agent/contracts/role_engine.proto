syntax = "proto3";

package suri.role_engine;

import "common.proto";

// 角色引擎服务接口

service RoleEngine {
  rpc ExecuteStep(StepExecutionRequest) returns (StepExecutionResult);
  rpc SendMessage(RoleMessage) returns (MessageRouteResult);
  rpc GetRoleContext(RoleId) returns (RoleContext);
  rpc CreateRole(RoleCreationRequest) returns (Role);
  rpc ListRoles(Empty) returns (RoleList);
  rpc ValidateSoul(SoulContent) returns (ValidationResult);
}

message RoleId { string id = 1; }

message StepExecutionRequest {
  string agent_id = 1;
  string step_id = 2;
  string role_id = 3;
  string task_content = 4;
  string step_description = 5;
  map<string, string> context = 6;
}

message StepExecutionResult {
  string step_id = 1;
  string status = 2;
  string output = 3;
  int32 tokens_used = 4;
}

message RoleMessage {
  string message_id = 1;
  string sender_role = 2;
  string receiver_role = 3;
  string content = 4;
  string task_ref = 5;
  int32 priority = 6;
}

message MessageRouteResult {
  string message_id = 1;
  string route = 2;
  bool delivered = 3;
}

message RoleContext {
  string role_id = 1;
  string soul_content = 2;
  repeated string recent_messages = 3;
  repeated string insights = 4;
  repeated string available_tools = 5;
}

message RoleCreationRequest {
  string role_id = 1;
  string department = 2;
  string nickname = 3;
  string role_type = 4;    // "admin" | "maintainer" | "reviewer" | "specialist"
  repeated string keywords = 5;
  repeated string capabilities = 6;
}

message Role {
  string id = 1;
  string department = 2;
  string nickname = 3;
  string role_type = 4;
  string soul_path = 5;
}

message RoleList {
  repeated Role roles = 1;
}

message SoulContent {
  string content = 1;
}

message ValidationResult {
  bool valid = 1;
  repeated string errors = 2;
}
