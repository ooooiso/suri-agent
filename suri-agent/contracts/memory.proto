syntax = "proto3";

package suri.memory;

import "common.proto";

// 记忆中心服务接口

service Memory {
  // 平台级数据
  rpc SaveMessage(Message) returns (Empty);
  rpc GetSessionMessages(SessionFilter) returns (MessageList);
  rpc CreateTask(Task) returns (Task);
  rpc GetTask(TaskId) returns (Task);
  rpc UpdateTaskStatus(TaskStatusUpdate) returns (Empty);
  
  // 角色级数据
  rpc SaveExperience(Experience) returns (Empty);
  rpc GetExperiences(RoleExperienceFilter) returns (ExperienceList);
  rpc SaveInsight(Insight) returns (Empty);
  rpc GetRecentInsights(RoleInsightFilter) returns (InsightList);
  rpc UpdateInsightTrigger(InsightId) returns (Empty);
  
  // 上下文组装
  rpc BuildContext(ContextRequest) returns (Context);
}

message TaskId { string id = 1; }
message InsightId { string id = 1; }

message Message {
  string id = 1;
  string session_id = 2;
  string role_id = 3;
  string content = 4;
  string type = 5;          // "user" | "assistant" | "system" | "tool"
  int64 timestamp = 6;
}

message SessionFilter {
  string session_id = 1;
  string role_id = 2;
  int32 limit = 3;
}

message MessageList {
  repeated Message messages = 1;
}

message Task {
  string id = 1;
  string session_id = 2;
  string role_id = 3;
  string content = 4;
  string status = 5;
}

message TaskStatusUpdate {
  string task_id = 1;
  string status = 2;
}

message Experience {
  string id = 1;
  string role_id = 2;
  string task_id = 3;
  string action = 4;
  string result = 5;
  string feedback = 6;
  repeated string tags = 7;
  int64 created_at = 8;
}

message RoleExperienceFilter {
  string role_id = 1;
  int32 limit = 2;
}

message ExperienceList {
  repeated Experience experiences = 1;
}

message Insight {
  string id = 1;
  string role_id = 2;
  string category = 3;
  string title = 4;
  string content = 5;
  float confidence = 6;
  int32 trigger_count = 7;
  int64 created_at = 8;
}

message RoleInsightFilter {
  string role_id = 1;
  string context = 2;
  int32 limit = 3;
  int32 max_chars = 4;
}

message InsightList {
  repeated Insight insights = 1;
}

message ContextRequest {
  string role_id = 1;
  string task_id = 2;
  string session_id = 3;
}

message Context {
  string system_prompt = 1;
  repeated string memories = 2;
  repeated string insights = 3;
  repeated string available_tools = 4;
  string platform_status = 5;
}
