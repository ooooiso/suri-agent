syntax = "proto3";

package suri.model;

import "common.proto";

// 模型中心服务接口

service Model {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatWithUsage(ChatRequest) returns (ChatResponseWithUsage);
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);
  rpc SelectModelForTask(TaskContent) returns (ModelSelection);
  rpc ListModels(Empty) returns (ModelList);
  rpc AddModel(ModelConfig) returns (Empty);
  rpc SetDefaultModel(ModelId) returns (Empty);
}

message ModelId { string id = 1; }

message ChatRequest {
  string model = 1;
  repeated Message messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
  string stream = 5;       // "true" | "false"
}

message Message {
  string role = 1;         // "system" | "user" | "assistant"
  string content = 2;
}

message ChatResponse {
  string content = 1;
  string model = 2;
  string finish_reason = 3;
}

message ChatResponseWithUsage {
  string content = 1;
  string model = 2;
  TokenUsage usage = 3;
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message ChatChunk {
  string content = 1;
  bool done = 2;
}

message TaskContent {
  string content = 1;
  string task_type = 2;    // "chat" | "code" | "vision" | "reasoning"
}

message ModelSelection {
  string model_id = 1;
  string reason = 2;
}

message ModelList {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string id = 1;
  string name = 2;
  string provider = 3;     // "openai" | "anthropic" | ...
  string model_type = 4;   // "chat" | "coder" | "vision" | "reasoning" | "long_context" | "fast"
  string cost_tier = 5;    // "free" | "low" | "medium" | "high" | "premium"
  bool is_default = 6;
}

message ModelConfig {
  string id = 1;
  string name = 2;
  string provider = 3;
  string api_key = 4;
  string base_url = 5;
  string model_type = 6;
}
