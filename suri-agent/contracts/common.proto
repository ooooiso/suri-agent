syntax = "proto3";

package suri.common;

// 通用消息类型

message Empty {}

message HealthCheckRequest {
  string service_name = 1;
}

message HealthCheckResponse {
  string status = 1;       // "healthy" | "unhealthy" | "degraded"
  string details = 2;
}

message ErrorResponse {
  int32 code = 1;
  string message = 2;
}
