syntax = "proto3";

package suri.config;

import "common.proto";

// 配置中心服务接口

service Config {
  rpc GetRoleSoul(RoleId) returns (Soul);
  rpc ResolveRoleId(Alias) returns (CanonicalRoleId);
  rpc ListDepartments(Empty) returns (DepartmentList);
  rpc ListRoles(DepartmentId) returns (RoleList);
  rpc GetRoleKeywords(RoleId) returns (KeywordList);
  rpc ListRoleSkills(RoleId) returns (SkillList);
  rpc GetSkillDetail(SkillId) returns (Skill);
  rpc SyncGroupFunction(Empty) returns (Empty);
  
  // 服务发现
  rpc RegisterService(ServiceRegistration) returns (Empty);
  rpc DeregisterService(ServiceId) returns (Empty);
  rpc DiscoverService(ServiceId) returns (ServiceEndpoint);
  rpc ListServices(Empty) returns (ServiceEndpointList);
}

message RoleId { string id = 1; }
message Alias { string alias = 1; }
message DepartmentId { string id = 1; }
message SkillId { string id = 1; }
message ServiceId { string id = 1; }

message Soul {
  string role_id = 1;
  string content = 2;
  map<string, string> frontmatter = 3;
}

message CanonicalRoleId {
  string id = 1;
}

message Department {
  string id = 1;
  string name = 2;
  string description = 3;
  string lead_role = 4;
}

message DepartmentList {
  repeated Department departments = 1;
}

message Role {
  string id = 1;
  string department = 2;
  string nickname = 3;
  string role_type = 4;
  repeated string keywords = 5;
  repeated string capabilities = 6;
  repeated string tools = 7;
}

message RoleList {
  repeated Role roles = 1;
}

message KeywordList {
  repeated string keywords = 1;
}

message Skill {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string required_tools = 4;
}

message SkillList {
  repeated Skill skills = 1;
}

message ServiceRegistration {
  string service_id = 1;
  string address = 2;      // unix socket path or tcp address
  string version = 3;
}

message ServiceEndpoint {
  string service_id = 1;
  string address = 2;
  string status = 3;       // "healthy" | "unhealthy"
}

message ServiceEndpointList {
  repeated ServiceEndpoint services = 1;
}
